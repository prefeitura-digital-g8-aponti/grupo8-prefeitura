<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal Integrado - Links</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <!-- Logo do Projeto (Agora usando o link absoluto do seu próprio GitHub) -->
      <img
        src="https://github.com/user-attachments/assets/b6009b9d-d440-4c49-9c4e-65a659b17adb"
        alt="Logo Prefeitura Municipal"
        class="profile-img"
      />

      <h1 class="title">Prefeitura Digital</h1>
      <p class="subtitle">Cenário 8 • Turma 5 • DevOps</p>

      <div class="links-container">
        <!-- Links Principais do Projeto com ícones circulares -->
        <a
          href="https://www.canva.com/design/DAHPDRK7fM8/GRQLorAniGZqWiDs1Kkm6w/edit?utm_content=DAHPDRK7fM8&utm_campaign=designshare&utm_medium=link2&utm_source=sharebutton"
          target="_blank"
          rel="noopener noreferrer"
          class="link-btn primary"
        >
          <!-- Atualizado com o link direto para o ícone oficial e colorido do Canva -->
          <div class="icon-circle">
            <img src="https://img.icons8.com/color/48/canva.png" alt="Canva" />
          </div>
          <span>Apresentação de Slides</span>
        </a>

        <a
          href="https://docs.google.com/forms/d/e/1FAIpQLScKq8n_S84cB6bOPCedAh3Uj3ZAEk9WzN7vbdK_FMMZmlM5sA/viewform?usp=header"
          target="_blank"
          rel="noopener noreferrer"
          class="link-btn primary"
        >
          <div class="icon-circle">
            <img
              src="https://cdn.simpleicons.org/googleforms/004b7c"
              alt="Forms"
            />
          </div>
          <span>Avaliação e Feedback</span>
        </a>

        <a
          href="https://github.com/prefeitura-digital-g8-aponti/grupo8-prefeitura"
          target="_blank"
          rel="noopener noreferrer"
          class="link-btn primary"
        >
          <div class="icon-circle">
            <img src="https://cdn.simpleicons.org/github/004b7c" alt="GitHub" />
          </div>
          <span>Organização do Projeto</span>
        </a>

        <div class="divider"></div>
        <p class="section-title">Equipe DevOps</p>

        <!-- Links dos Perfis da Equipe com ícones do GitHub -->
        <a
          href="https://github.com/gavvdev"
          target="_blank"
          rel="noopener noreferrer"
          class="link-btn secondary"
        >
          <div class="icon-circle">
            <img src="https://cdn.simpleicons.org/github/004b7c" alt="GitHub" />
          </div>
          <span>Gabriela Pires</span>
        </a>

        <a
          href="https://github.com/felipeGTBR"
          target="_blank"
          rel="noopener noreferrer"
          class="link-btn secondary"
        >
          <div class="icon-circle">
            <img src="https://cdn.simpleicons.org/github/004b7c" alt="GitHub" />
          </div>
          <span>Luiz Felipe Gomes</span>
        </a>

        <a
          href="https://github.com/rafael-albuquerque07"
          target="_blank"
          rel="noopener noreferrer"
          class="link-btn secondary"
        >
          <div class="icon-circle">
            <img src="https://cdn.simpleicons.org/github/004b7c" alt="GitHub" />
          </div>
          <span>Rafael Albuquerque</span>
        </a>
      </div>
    </div>

    <!-- Bloco do QR Code no canto inferior direito -->
    <div class="qrcode-container">
      <p>Acesse o Portal</p>
      <img
        src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://prefeitura-digital-g8-aponti.github.io/grupo8-prefeitura/"
        alt="QR Code Linktree"
      />
    </div>

    <script src="script.js"></script>
  </body>
</html>
